version: '3.8'
services:
  db:
    image: postgres:15
    container_name: fluid-tasks-db
    environment:
      POSTGRES_DB: fluid_tasks
      POSTGRES_USER: tinsiz
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: fluid-tasks-app
    ports:
      - "8081:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/fluid_tasks
      SPRING_DATASOURCE_USERNAME: tinsiz
      SPRING_DATASOURCE_PASSWORD: password